format = """
[](#9A348E)\
$username$hostname\
[](bg:#DA627D fg:#9A348E)\
${custom.smart_directory}\
[](fg:#DA627D bg:#FCA17D)\
$git_branch\
$git_status\
[](fg:#FCA17D bg:#86BBD8)\
$python\
$lua\
$golang\
$nodejs\
$rust\
$scala\
[](fg:#86BBD8 bg:#06969A)\
$docker_context\
[](fg:#06969A bg:#33658A)\
$time\
[ ](fg:#33658A)\
"""

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like   or disable this
# and use the os module below
[username]
show_always = true
style_user = "bg:#9A348E"
style_root = "bg:#9A348E"
format = '[$user]($style)'
disabled = false

# Add host/computer name
[hostname]
ssh_only = false
style = "bg:#9A348E"
format = '[@$hostname ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "bg:#9A348E"
disabled = true # Disabled by default

[directory]
style = "bg:#DA627D"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[custom.smart_directory]
description = "Shorten long directory names by default"
shell = ["bash", "--noprofile", "--norc", "-c"]
use_stdin = false
when = "true"
style = "bg:#DA627D"
format = "[ $output ]($style)"
command = '''
path="${PWD/#$HOME/~}"
IFS='/' read -r -a parts <<< "$path"
count="${#parts[@]}"
start=0
prefix=""

if (( count > 3 )); then
	start=$((count - 3))
	prefix="…/"
fi

out=""
for ((i=start; i<count; i++)); do
	seg="${parts[i]}"

	if [[ -z "$seg" ]]; then
		continue
	fi

	if (( ${#seg} > 30 )); then
		# For names like "date - topic - details", keep only the first two parts.
		if [[ "$seg" == *" - "* ]]; then
			first="${seg%% - *}"
			rest="${seg#* - }"
			second="${rest%% - *}"

			if [[ -n "$first" && -n "$second" && "$first" != "$seg" ]]; then
				seg="$first - $second"
			fi
		fi

		if (( ${#seg} > 30 )); then
			seg="${seg:0:27}…"
		fi
	fi

	if [[ -n "$out" ]]; then
		out+="/"
	fi
	out+="$seg"
done

printf "%s%s\n" "$prefix" "$out"
'''

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
# Keep in mind that the order matters. For example:
# "Important Documents" = " 󰈙 "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important 󰈙 " = " 󰈙 "

[c]
symbol = " "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = " "
style = "bg:#06969A"
format = '[ $symbol $context ]($style)'

[git_branch]
symbol = ""
style = "bg:#FCA17D"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#FCA17D"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = " "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = " "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#33658A"
format = '[ ♥ $time ]($style)'
